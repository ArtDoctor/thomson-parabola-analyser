[pytest]
testpaths = tests
pythonpath = .
addopts = -ra
filterwarnings =
    ignore:In future, it will be an error for 'np.bool_' scalars to be interpreted as an index:DeprecationWarning
    ignore:.*utcfromtimestamp\(\) is deprecated.*:DeprecationWarning:pytz.tzinfo
markers =
    integration: tests that require local data files or larger fixtures
